<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingdom Builder | 전문가용 시간론 분석 리포트</title>
    <style>
        /* 모든 요소에 박스 사이징 적용하여 잘림 방지 */
        * { box-sizing: border-box; }

        :root {
            --primary-blue: #0a192f;
            --gold: #d4af37;
            --text-dark: #1f2937;
            --bg-light: #f9fafb;
            --white: #ffffff;
        }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg-light); color: var(--text-dark); margin: 0; padding: 0; }
        
        .container { 
            width: 95%; /* 모바일 및 태블릿 대응을 위해 유동적으로 설정 */
            max-width: 900px; 
            margin: 40px auto; 
            padding: 30px; 
            background: var(--white); 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            border-top: 10px solid var(--primary-blue);
            overflow: hidden; /* 영역 밖으로 나가는 것 방지 */
        }
        
        header { border-bottom: 2px solid var(--gold); padding-bottom: 20px; margin-bottom: 30px; text-align: center; }
        header h1 { font-size: 2rem; color: var(--primary-blue); margin: 0; letter-spacing: -1px; }
        header p { color: var(--gold); font-weight: bold; margin: 0; margin-top: 5px; }

        .input-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f3f4f6; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .input-group label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: var(--primary-blue); }
        input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 1rem; }
        
        .btn-analyze { width: 100%; padding: 15px; background: var(--primary-blue); color: var(--white); border: none; border-radius: 6px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-analyze:hover { background: #112240; }

        #reportContent { display: none; }
        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; flex-wrap: wrap; }
        .report-header h2 { font-size: 1.4rem; color: var(--primary-blue); margin: 0; }
        .report-date { font-size: 0.9rem; color: #6b7280; }

        /* 테이블 스크롤 방지 및 너비 고정 */
        .table-container { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; table-layout: fixed; }
        th { background: var(--primary-blue); color: var(--white); padding: 12px; text-align: left; font-size: 0.9rem; }
        td { padding: 12px; border-bottom: 1px solid #e5e7eb; font-size: 0.95rem; word-break: break-all; }
        
        .highlight-row { background: #fffcf0; }
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; color: white; margin-right: 5px; white-space: nowrap; }
        .tag-basic { background: #3b82f6; }
        .tag-complex { background: #10b981; }
        .tag-cycle { background: #f59e0b; }

        /* 분석 소견 잘림 방지 핵심 설정 */
        .analysis-box { 
            margin-top: 30px; 
            padding: 20px; 
            border: 1px solid var(--gold); 
            border-radius: 8px; 
            background: #fffdf5; 
            width: 100%;
        }
        .analysis-box h3 { margin-top: 0; color: var(--primary-blue); font-size: 1.1rem; }
        #analysisText { 
            line-height: 1.7; 
            word-break: keep-all; /* 단어 단위로 줄바꿈하여 가독성 향상 */
            overflow-wrap: break-word; /* 긴 단어는 강제로 줄바꿈 */
            margin-bottom: 0;
        }
        
        .footer-note { text-align: center; font-size: 0.8rem; color: #9ca3af; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }

        @media print {
            .input-section, .btn-analyze, .btn-print, .theme-toggle { display: none !important; }
            .container { box-shadow: none; border: none; margin: 0; width: 100%; padding: 0; }
            body { background: white; }
            .analysis-box { page-break-inside: avoid; } /* 인쇄 시 박스가 잘리지 않게 설정 */
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Kingdom Builder Finance</h1>
        <p>Professional Ichimoku Time Theory Report</p>
    </header>

    <div class="input-section">
        <div class="input-group">
            <label>분석 종목명</label>
            <input type="text" id="stockName" placeholder="예: 삼성전자">
        </div>
        <div class="input-group">
            <label>기준 날짜 (바닥/고점)</label>
            <input type="date" id="baseDate">
        </div>
        <div class="input-group">
            <label>리포트 작성자</label>
            <input type="text" id="author" value="Kingdom Builder">
        </div>
        <button class="btn-analyze" onclick="generateReport()">리포트 생성 및 분석 시작</button>
    </div>

    <div id="reportContent">
        <div class="report-header">
            <h2 id="dispStockName">분석 리포트</h2>
            <div class="report-date" id="reportGenTime"></div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 30%;">구분</th>
                        <th style="width: 15%;">수치</th>
                        <th style="width: 35%;">예측 변곡일</th>
                        <th style="width: 20%;">비고</th>
                    </tr>
                </thead>
                <tbody id="reportTableBody">
                    </tbody>
            </table>
        </div>

        <div class="analysis-box">
            <h3>📝 종합 분석 소견</h3>
            <p id="analysisText"></p>
            <p style="font-size: 0.85rem; color: #666; margin-top: 15px; border-top: 1px dashed #d4af37; padding-top: 10px;">
                * 본 리포트는 일목균형표 시간론에 근거한 기술적 분석이며, 최종 투자 결정은 투자자 본인에게 있습니다.
            </p>
        </div>

        <button onclick="window.print()" class="btn-analyze" style="background: var(--gold); margin-top: 30px;">리포트 인쇄 / PDF 저장</button>
    </div>

    <footer class="footer-note">
        © 2026 Kingdom Builder. "The Mark" Trading System Pro Version.
    </footer>
</div>

<script>
    const holidays = ["2026-01-01", "2026-02-16", "2026-02-17", "2026-02-18", "2026-03-01", "2026-03-02", "2026-05-05", "2026-05-24", "2026-05-25", "2026-10-09", "2026-12-25", "2026-12-31"];
    
    function addTradingDays(date, days) {
        let res = new Date(date);
        let count = 0;
        while(count < (days - 1)) {
            res.setDate(res.getDate() + 1);
            let day = res.getDay();
            let dStr = res.toISOString().split('T')[0];
            if(day !== 0 && day !== 6 && !holidays.includes(dStr)) count++;
        }
        return res.toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'short'});
    }

    function generateReport() {
        const name = document.getElementById('stockName').value || "미지정 종목";
        const bDate = document.getElementById('baseDate').value;
        const writer = document.getElementById('author').value;
        if(!bDate) return alert('기준 날짜를 선택해 주세요.');

        const base = new Date(bDate);
        document.getElementById('reportContent').style.display = 'block';
        document.getElementById('dispStockName').innerText = `[${name}] 시간론 분석 리포트`;
        document.getElementById('reportGenTime').innerText = `작성자: ${writer} | 분석일: ${new Date().toLocaleDateString()}`;

        const targets = [
            {v: 9, t: 'tag-basic', n: '단기 1절'},
            {v: 13, t: 'tag-basic', n: '단기 변곡'},
            {v: 17, t: 'tag-basic', n: '단기 2절'},
            {v: 26, t: 'tag-complex', n: '1기 (一期)'},
            {v: 33, t: 'tag-complex', n: '단기 복합'},
            {v: 42, t: 'tag-complex', n: '2기 (二期)'},
            {v: 52, t: 'tag-complex', n: '1단 (一段)'},
            {v: 65, t: 'tag-cycle', n: '중기 변곡'},
            {v: 76, t: 'tag-cycle', n: '1순 (一巡)'},
            {v: 129, t: 'tag-cycle', n: '대등수치 마디'}
        ];

        let html = '';
        targets.forEach(item => {
            const resDate = addTradingDays(base, item.v);
            html += `<tr class="${item.v === 26 || item.v === 76 ? 'highlight-row' : ''}">
                <td><span class="tag ${item.t}">${item.n}</span></td>
                <td><b>${item.v}</b></td>
                <td>${resDate}</td>
                <td>${item.v === 26 ? '변곡 주의' : item.v === 76 ? '마디 완성' : '-'}</td>
            </tr>`;
        });
        document.getElementById('reportTableBody').innerHTML = html;

        document.getElementById('analysisText').innerText = 
            `${name} 종목의 기준일(${bDate})로부터 산출된 주요 시간마디입니다. 특히 일목균형표의 1기(26일)가 도래하는 ${addTradingDays(base, 26)} 전후는 매우 중요한 변곡점이 될 가능성이 높습니다. 현재 진행 중인 'The Mark' 트레이딩 시스템과 연계하여 최적의 진입 및 청산 타이밍을 포착하시기 바랍니다.`;
        
        // 리포트 생성 후 부드럽게 아래로 스크롤
        window.scrollTo({ top: document.getElementById('reportContent').offsetTop - 20, behavior: 'smooth' });
    }
</script>
</body>
</html>
